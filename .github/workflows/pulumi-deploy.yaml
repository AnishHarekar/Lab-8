name: Pulumi Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          export PATH=$HOME/.pulumi/bin:$PATH

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/GitHubActionsRole
          role-session-name: GitHubActions
          aws-region: us-east-1

      - name: Install Dependencies
        run: npm install

      - name: Pulumi Up - Deploy Resources
        uses: pulumi/actions@v4
        with:
          command: up
          stack: YOUR_PULUMI_STACK
          cloud-url: pulumi://YOUR_ORG/YOUR_PROJECT
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Save Pulumi Logs
        run: pulumi logs > pulumi.log || echo "No logs available"

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulumi-Output
          path: pulumi.log
