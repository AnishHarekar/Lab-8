name: Pulumi Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install Pulumi
        uses: pulumi/actions@v4
        with:
          command: up
          stack-name: YOUR_PULUMI_STACK
          cloud-url: pulumi://YOUR_ORG/YOUR_PROJECT

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Pulumi Output
          path: ./pulumi.log
